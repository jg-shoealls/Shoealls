data:
  data_dir: data/weargait_pd
  imu_channels: 12
  num_classes: 2
  pressure_grid_size:
  - 4
  - 8
  stride: 64
  window: 128
model:
  classifier:
    dropout: 0.3
    hidden_dims:
    - 128
    - 64
  fusion:
    dropout: 0.2
    embed_dim: 128
    ff_dim: 256
    num_heads: 4
    num_layers: 2
  imu_encoder:
    conv_channels:
    - 32
    - 64
    - 128
    dropout: 0.3
    kernel_size: 5
    lstm_hidden: 128
    lstm_layers: 2
  pressure_encoder:
    conv_channels:
    - 16
    - 32
    - 64
    dropout: 0.3
    kernel_size: 3
training:
  batch_size: 32
  early_stopping:
    min_delta: 0.005
    patience: 5
  epochs: 30
  learning_rate: 0.001
  scheduler:
    type: cosine
    warmup_epochs: 3
  weight_decay: 0.0001
validation:
  metrics:
  - accuracy
  - f1_macro
  - precision
  - recall
  - confusion_matrix
