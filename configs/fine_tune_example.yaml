# Fine-tuning Configuration Example
# Based on default.yaml but with lower learning rate for fine-tuning

data:
  sequence_length: 128
  imu_channels: 6
  pressure_grid_size: [16, 8]
  skeleton_joints: 17
  skeleton_dims: 3
  num_classes: 11
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

model:
  imu_encoder:
    conv_channels: [32, 64, 128]
    kernel_size: 5
    lstm_hidden: 128
    lstm_layers: 2
    dropout: 0.3

  pressure_encoder:
    conv_channels: [16, 32, 64]
    kernel_size: 3
    dropout: 0.3

  skeleton_encoder:
    gcn_channels: [64, 128]
    temporal_kernel: 3
    dropout: 0.3

  fusion:
    embed_dim: 128
    num_heads: 4
    ff_dim: 256
    num_layers: 2
    dropout: 0.2

  classifier:
    hidden_dims: [128, 64]
    dropout: 0.3

training:
  batch_size: 16       # Smaller batch size for fine-tuning
  epochs: 20           # Fewer epochs for fine-tuning
  learning_rate: 0.0001 # 10x lower LR (Critical for fine-tuning)
  weight_decay: 0.0001
  scheduler:
    type: cosine
    warmup_epochs: 2
  early_stopping:
    patience: 5
    min_delta: 0.001

validation:
  metrics: [accuracy, f1_macro, precision, recall, confusion_matrix]
