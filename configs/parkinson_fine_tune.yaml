# Specific Fine-tuning: Parkinson vs Normal
# Focused on distinguishing between specific conditions with high precision

data:
  sequence_length: 128
  imu_channels: 6
  pressure_grid_size: [16, 8]
  skeleton_joints: 17
  skeleton_dims: 3
  num_classes: 2          # 2 classes: Normal (0) vs Parkinson (1)
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  target_classes: [0, 3]  # Map: 0 (Normal), 3 (Parkinsonian) from original 11 classes

model:
  imu_encoder:
    conv_channels: [32, 64, 128]
    kernel_size: 5
    lstm_hidden: 128
    lstm_layers: 2
    dropout: 0.3

  pressure_encoder:
    conv_channels: [16, 32, 64]
    kernel_size: 3
    dropout: 0.3

  skeleton_encoder:
    gcn_channels: [64, 128]
    temporal_kernel: 3
    dropout: 0.3

  fusion:
    embed_dim: 128
    num_heads: 4
    ff_dim: 256
    num_layers: 2
    dropout: 0.2

  classifier:
    hidden_dims: [128, 64]
    dropout: 0.3

training:
  batch_size: 16
  epochs: 30
  learning_rate: 0.00005  # Even lower LR for very specific fine-tuning
  weight_decay: 0.0001
  scheduler:
    type: cosine
    warmup_epochs: 3
  early_stopping:
    patience: 7
    min_delta: 0.0005

validation:
  metrics: [accuracy, f1_macro, precision, recall, confusion_matrix]
