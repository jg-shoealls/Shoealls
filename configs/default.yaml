# Multimodal Walking AI Algorithm Configuration

data:
  sequence_length: 128
  imu_channels: 6          # 3-axis accel + 3-axis gyro
  pressure_grid_size: [16, 8]  # pressure sensor grid (H x W)
  skeleton_joints: 17      # number of body keypoints
  skeleton_dims: 3         # x, y, z coordinates
  num_classes: 4           # normal, antalgic, ataxic, parkinsonian
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

model:
  imu_encoder:
    conv_channels: [32, 64, 128]
    kernel_size: 5
    lstm_hidden: 128
    lstm_layers: 2
    dropout: 0.3

  pressure_encoder:
    conv_channels: [16, 32, 64]
    kernel_size: 3
    dropout: 0.3

  skeleton_encoder:
    gcn_channels: [64, 128]
    temporal_kernel: 3
    dropout: 0.3

  fusion:
    embed_dim: 128
    num_heads: 4
    ff_dim: 256
    num_layers: 2
    dropout: 0.2

  classifier:
    hidden_dims: [128, 64]
    dropout: 0.3

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 15
    min_delta: 0.001

validation:
  metrics: [accuracy, f1_macro, precision, recall, confusion_matrix]

# HuggingFace 인코더 설정 (hf_gait_net.HFMultimodalGaitNet 에서 사용)
# enabled: true 시 run_pipeline.py 에서 HFMultimodalGaitNet 으로 자동 전환
hf_encoders:
  enabled: false          # true 로 변경하면 HF 모델 사용

  patchtst:
    pretrained: true      # false = random init (오프라인/빠른 테스트 시)
    patch_len: 16         # 패치 길이 (IMU T=128, stride=8 → 약 15 패치)
    stride: 8
    d_model: 128          # PatchTST hidden dim (embed_dim 과 일치)
    num_heads: 4
    num_layers: 3
    dropout: 0.2
    model_id: "ibm-granite/granite-timeseries-patchtst"

  videomae:
    pretrained: true      # false = random init
    img_size: 224         # 스틱피겨 캔버스 크기
    num_frames: 16        # VideoMAE 입력 프레임 수
    dropout: 0.2
    model_id: "MCG-NJU/videomae-base"

  llm_report:
    enabled: false        # true = BioMistral 임상 보고서 생성
    model_id: "BioMistral/BioMistral-7B"
    fallback_model_id: "dmis-lab/biobert-base-cased-v1.2"
    max_new_tokens: 512
    temperature: 0.3
