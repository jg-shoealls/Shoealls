# Multimodal Walking AI Algorithm Configuration

data:
  sequence_length: 128
  imu_channels: 6          # 3-axis accel + 3-axis gyro
  pressure_grid_size: [16, 8]  # pressure sensor grid (H x W)
  skeleton_joints: 17      # number of body keypoints
  skeleton_dims: 3         # x, y, z coordinates
  num_classes: 4           # normal, antalgic, ataxic, parkinsonian
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15

model:
  imu_encoder:
    conv_channels: [32, 64, 128]
    kernel_size: 5
    lstm_hidden: 128
    lstm_layers: 2
    dropout: 0.3

  pressure_encoder:
    conv_channels: [16, 32, 64]
    kernel_size: 3
    dropout: 0.3

  mag_baro_encoder:
    conv_channels: [32, 64]
    kernel_size: 5
    lstm_layers: 1
    dropout: 0.3

  fusion:
    embed_dim: 128
    num_heads: 4
    ff_dim: 256
    num_layers: 2
    dropout: 0.2

  classifier:
    hidden_dims: [128, 64]
    dropout: 0.3

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler:
    type: cosine
    warmup_epochs: 5
  early_stopping:
    patience: 15
    min_delta: 0.001

validation:
  metrics: [accuracy, f1_macro, precision, recall, confusion_matrix]
