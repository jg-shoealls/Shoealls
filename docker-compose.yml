services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_MODEL=llama3.2
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ollama_data:
